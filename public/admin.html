<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MiraBeauty 管理中心</title><link rel="stylesheet" href="/styles.css"></head><body><main><header class="hero"><h1>MiraBeauty 管理中心</h1><p>內容、課程與點數規則</p></header><div class="content"><div id="status" class="notice">載入中…</div><section class="card"><h2>新增點數規則</h2><input id="ruleEvent" placeholder="事件，例如 daily_ad_checkin"><input id="rulePoints" type="number" placeholder="點數"><select id="ruleStatus"><option value="draft">草稿</option><option value="active">啟用</option></select><button class="btn" data-form="rule">建立規則</button></section><section class="card"><h2>新增課程</h2><input id="courseTitle" placeholder="課程名稱"><input id="courseDesc" placeholder="課程說明"><select id="courseStatus"><option value="draft">草稿</option><option value="published">公開</option></select><button class="btn" data-form="course">建立課程</button></section><section class="card"><h2>新增輪播活動</h2><input id="campaignName" placeholder="活動名稱"><label class="small">開始時間</label><input id="campaignStart" type="datetime-local"><label class="small">結束時間</label><input id="campaignEnd" type="datetime-local"><input id="campaignCount" type="number" value="1" min="1" placeholder="需完成素材數"><select id="campaignStatus"><option value="draft">草稿</option><option value="active">啟用</option></select><button class="btn" data-form="campaign">建立活動</button></section><section class="card"><h2>新增輪播素材</h2><input id="creativeCampaign" placeholder="活動 ID"><select id="creativeType"><option value="image">圖片</option><option value="video">影片</option></select><input id="creativeTitle" placeholder="標題"><input id="creativeUrl" placeholder="圖片／影片網址"><input id="creativeSeconds" type="number" value="3" min="0" placeholder="最低觀看秒數"><button class="btn" data-form="creative">建立素材</button></section></div></main><script type="module">const token=localStorage.getItem('mirabeauty_session')||'';const $=s=>document.querySelector(s);const api=async(p,b)=>{const r=await fetch(p,{method:'POST',headers:{'content-type':'application/json',authorization:'Bearer '+token},body:JSON.stringify(b)});const j=await r.json();if(!r.ok)throw new Error(j.error||'失敗');return j};const date=v=>v?new Date(v).toISOString():'';try{const o=await fetch('/v1/admin/overview',{headers:{authorization:'Bearer '+token}}).then(r=>r.json());if(!o.success)throw new Error(o.error);$('#status').textContent=`會員 ${o.overview.members} 人｜公開課程 ${o.overview.publishedCourses} 堂｜啟用輪播 ${o.overview.activeCampaigns} 個`}catch(e){$('#status').textContent='無管理權限：'+e.message}document.querySelectorAll('[data-form]').forEach(b=>b.onclick=async()=>{try{let x;if(b.dataset.form==='rule')x=await api('/v1/admin/point-rules',{eventType:$('#ruleEvent').value,points:+$('#rulePoints').value,status:$('#ruleStatus').value});if(b.dataset.form==='course')x=await api('/v1/admin/courses',{title:$('#courseTitle').value,description:$('#courseDesc').value,status:$('#courseStatus').value});if(b.dataset.form==='campaign')x=await api('/v1/admin/ad-campaigns',{name:$('#campaignName').value,startsAt:date($('#campaignStart').value),endsAt:date($('#campaignEnd').value),requiredCreativeCount:+$('#campaignCount').value,status:$('#campaignStatus').value});if(b.dataset.form==='creative')x=await api('/v1/admin/ad-creatives',{campaignId:$('#creativeCampaign').value,type:$('#creativeType').value,title:$('#creativeTitle').value,mediaUrl:$('#creativeUrl').value,requiredWatchSeconds:+$('#creativeSeconds').value});alert('建立完成，ID：'+x.id)}catch(e){alert(e.message)}})</script></body></html>
